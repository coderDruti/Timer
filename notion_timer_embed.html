<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Timer Embed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    },
                    colors: {
                        notion: {
                            bg: '#ffffff',
                            text: '#37352f',
                            border: '#e9e9e7',
                            hover: '#efefef',
                            light: '#787774',
                            primary: '#2383e2'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: transparent; 
            color: #37352f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* input[type="number"] {
            -moz-appearance: textfield;
        } */

        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .timer-done-pulse {
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { stroke: #e03e3e; }
            50% { stroke: #ff7373; }
            100% { stroke: #e03e3e; }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="w-full max-w-sm bg-white rounded-xl border border-notion-border shadow-sm p-6 flex flex-col items-center relative">
        
    

        <!-- View Toggle -->
        <div class="flex justify-center w-full mb-4 z-20">
            <div class="flex bg-gray-100/80 p-0.5 rounded-lg border border-gray-200/50">
                <button id="btn-view-digital" class="px-3 py-1 text-xs font-medium rounded-md bg-white shadow-sm text-notion-text transition-all">Digital</button>
                <button id="btn-view-analog" class="px-3 py-1 text-xs font-medium rounded-md bg-transparent text-notion-light hover:text-notion-text transition-all">Analog</button>
            </div>
        </div>

        <!-- Timer Visual Area -->
        <div class="relative w-48 h-48 mb-8 flex justify-center items-center group">
            
            <!-- Digital View -->
            <div id="digital-container" class="w-full h-full relative flex justify-center items-center">
                <!-- SVG Progress Ring -->
                <svg class="w-full h-full absolute top-0 left-0" viewBox="0 0 100 100">
                    <!-- Background track -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#f3f4f6" stroke-width="4"></circle>
                    <!-- Progress track -->
                    <circle id="progress-circle" class="progress-ring__circle" cx="50" cy="50" r="45" fill="none" stroke="#2383e2" stroke-width="4" stroke-linecap="round"></circle>
                </svg>

                <!-- Default Display View -->
                <div id="display-view" class="flex flex-col items-center justify-center z-10 w-full h-full">
                    <span id="time-display" class="font-mono text-4xl font-semibold tracking-tighter text-notion-text mb-1">00:00</span>
                    <button id="btn-edit-inline" class="text-xs flex items-center gap-1 text-notion-light hover:text-notion-text transition-colors opacity-0 group-hover:opacity-100 px-2 py-1 rounded bg-notion-hover/50 hover:bg-notion-hover" title="Edit Duration">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Edit
                    </button>
                </div>

                <!-- Edit Duration View -->
                <div id="edit-view" class="hidden flex-col items-center justify-center z-10 w-full h-full bg-white rounded-full">
                    <div class="flex items-center justify-center gap-1 font-mono text-xl font-medium text-notion-text">
                        <div class="flex flex-col items-center">
                            <input type="number" id="input-hours" min="0" max="99" value="00" class="w-10 text-center bg-gray-50 border border-gray-200 rounded focus:outline-none focus:border-notion-primary focus:ring-1 focus:ring-notion-primary transition-all p-1" placeholder="HH">
                            <span class="text-[10px] text-notion-light mt-1 font-sans">HR</span>
                        </div>
                        <span class="text-notion-light pb-4">:</span>
                        <div class="flex flex-col items-center">
                            <input type="number" id="input-minutes" min="0" max="59" value="00" class="w-10 text-center bg-gray-50 border border-gray-200 rounded focus:outline-none focus:border-notion-primary focus:ring-1 focus:ring-notion-primary transition-all p-1" placeholder="MM">
                            <span class="text-[10px] text-notion-light mt-1 font-sans">MIN</span>
                        </div>
                        <span class="text-notion-light pb-4">:</span>
                        <div class="flex flex-col items-center">
                            <input type="number" id="input-seconds" min="0" max="59" value="00" class="w-10 text-center bg-gray-50 border border-gray-200 rounded focus:outline-none focus:border-notion-primary focus:ring-1 focus:ring-notion-primary transition-all p-1" placeholder="SS">
                            <span class="text-[10px] text-notion-light mt-1 font-sans">SEC</span>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button id="btn-cancel-edit" class="p-1.5 rounded text-notion-light hover:bg-gray-100 transition-colors" title="Cancel">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <button id="btn-save-edit" class="p-1.5 rounded text-white bg-notion-primary hover:bg-blue-600 transition-colors" title="Save">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Analog View -->
            <div id="analog-container" class="w-full h-full relative hidden">
                <svg id="analog-svg" viewBox="0 0 100 100" class="w-full h-full touch-none">
                    <circle cx="50" cy="50" r="45" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"></circle>
                    <g id="analog-ticks"></g>
                    <!-- Full hour circles container -->
                    <g id="analog-hours"></g>
                    <!-- Pie slice for time -->
                    <path id="analog-pie" fill="#2383e2" fill-opacity="0.8" d="M 50 50 L 50 5 A 45 45 0 0 1 50 5 Z"></path>
                    <!-- Center pin -->
                    <circle cx="50" cy="50" r="2.5" fill="#37352f"></circle>
                    <!-- Draggable knob -->
                    <circle id="analog-knob" cx="50" cy="5" r="4.5" fill="#ffffff" stroke="#2383e2" stroke-width="2" class="hover:scale-125 transition-transform origin-center"></circle>
                </svg>
                <!-- Small digital readout in center -->
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <div class="mt-20">
                        <span id="analog-time-display" class="font-mono text-[11px] font-semibold text-notion-text bg-white/90 px-1.5 py-0.5 rounded shadow-sm border border-gray-100">00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center justify-center gap-4 w-full">
            <button id="btn-reset" class="w-10 h-10 flex items-center justify-center rounded-full text-notion-light hover:bg-notion-hover hover:text-notion-text transition-all duration-200" title="Reset Timer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            
            <button id="btn-play-pause" class="w-14 h-14 flex items-center justify-center rounded-full bg-notion-text text-white hover:bg-gray-800 shadow-sm transition-all duration-200 hover:scale-105 active:scale-95" title="Start Timer">
                <!-- Play Icon SVG -->
                <svg id="icon-play" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                <!-- Pause Icon SVG -->
                <svg id="icon-pause" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
            </button>
            
            <button id="btn-stop" class="w-10 h-10 flex items-center justify-center rounded-full text-notion-light hover:bg-notion-hover hover:text-notion-text transition-all duration-200 opacity-50 cursor-not-allowed" disabled title="Stop & Clear">
                <!-- Stop Icon SVG -->
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"></path></svg>
            </button>
        </div>
        
    </div>

    <script>
        // --- State Variables ---
        let totalTimeSeconds = 0 * 60; 
        let remainingSeconds = totalTimeSeconds;
        let isRunning = false;
        let timerInterval = null;
        let expectedEndTime = null;

        // --- DOM Elements ---
        const timeDisplay = document.getElementById('time-display');
        const progressCircle = document.getElementById('progress-circle');
        
        const analogTimeDisplay = document.getElementById('analog-time-display');
        const analogSvg = document.getElementById('analog-svg');
        const analogTicks = document.getElementById('analog-ticks');
        const analogPie = document.getElementById('analog-pie');
        const analogKnob = document.getElementById('analog-knob');
        
        const btnViewDigital = document.getElementById('btn-view-digital');
        const btnViewAnalog = document.getElementById('btn-view-analog');
        const digitalContainer = document.getElementById('digital-container');
        const analogContainer = document.getElementById('analog-container');

        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnReset = document.getElementById('btn-reset');
        const btnStop = document.getElementById('btn-stop');
        
        const btnEditInline = document.getElementById('btn-edit-inline');
        const displayView = document.getElementById('display-view');
        const editView = document.getElementById('edit-view');
        
        const inputHours = document.getElementById('input-hours');
        const inputMinutes = document.getElementById('input-minutes');
        const inputSeconds = document.getElementById('input-seconds');
        const btnSaveEdit = document.getElementById('btn-save-edit');
        const btnCancelEdit = document.getElementById('btn-cancel-edit');

        // SVG Circle setup for progress
        const radius = progressCircle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        progressCircle.style.strokeDashoffset = 0;

        // --- Core Functions ---

        function updateDisplay() {
            let hrs = Math.floor(remainingSeconds / 3600);
            let mins = Math.floor((remainingSeconds % 3600) / 60);
            let secs = Math.floor(remainingSeconds % 60);

            let timeString = '';
            if (hrs > 0) {
                timeString += `${hrs.toString().padStart(2, '0')}:`;
            }
            timeString += `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            timeDisplay.textContent = timeString;
            analogTimeDisplay.textContent = timeString;

            const progress = totalTimeSeconds > 0 ? (remainingSeconds / totalTimeSeconds) : 0;
            const offset = circumference - progress * circumference;
            progressCircle.style.strokeDashoffset = offset;
            
            if (remainingSeconds <= 0) {
                progressCircle.style.strokeDashoffset = 0; 
                progressCircle.classList.add('timer-done-pulse');
                timeDisplay.classList.add('text-red-500');
                analogPie.setAttribute('fill', '#e03e3e');
                analogTimeDisplay.classList.add('text-red-500');
            } else {
                progressCircle.classList.remove('timer-done-pulse');
                timeDisplay.classList.remove('text-red-500');
                analogPie.setAttribute('fill', '#2383e2');
                analogTimeDisplay.classList.remove('text-red-500');
            }

            drawAnalogPie();
        }

        function drawAnalogPie() {
            const hours = Math.floor(remainingSeconds / 3600);
            const fractionSeconds = remainingSeconds % 3600;
            let percent = fractionSeconds / 3600;
            
            let hoursHtml = '';
            if (hours > 0) {
                for(let i = 1; i <= hours; i++) {
                    if(i > 12) break; 
                    const r = 45 - (i * 3);
                    hoursHtml += `<circle cx="50" cy="50" r="${r}" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"></circle>`;
                }
            }
            document.getElementById('analog-hours').innerHTML = hoursHtml;

            if (remainingSeconds <= 0) {
                analogPie.setAttribute('d', '');
                analogKnob.setAttribute('cx', 50);
                analogKnob.setAttribute('cy', 5);
                return;
            }

            if (percent === 0 && hours > 0) {
                analogPie.setAttribute('d', '');
                analogKnob.setAttribute('cx', 50);
                analogKnob.setAttribute('cy', 5);
                return;
            }

            if (percent >= 1) {
                analogPie.setAttribute('d', `M 50 50 L 50 5 A 45 45 0 1 1 49.9 5 Z`);
                analogKnob.setAttribute('cx', 50);
                analogKnob.setAttribute('cy', 5);
                return;
            }

            const angle = percent * 2 * Math.PI;
            const x = 50 + 45 * Math.sin(angle);
            const y = 50 - 45 * Math.cos(angle);
            const largeArc = percent > 0.5 ? 1 : 0;
            
            analogPie.setAttribute('d', `M 50 50 L 50 5 A 45 45 0 ${largeArc} 1 ${x} ${y} Z`);
            analogKnob.setAttribute('cx', x);
            analogKnob.setAttribute('cy', y);
        }

        function timerTick() {
            const now = Date.now();
            remainingSeconds = Math.max(0, (expectedEndTime - now) / 1000);
            
            updateDisplay();

            if (remainingSeconds <= 0) {
                pauseTimer();
                remainingSeconds = 0;
                updateDisplay();
            }
        }

        function startTimer() {
            if (isRunning || remainingSeconds <= 0) return;
            
            if (remainingSeconds <= 0 && totalTimeSeconds > 0) {
                remainingSeconds = totalTimeSeconds;
            }

            isRunning = true;
            expectedEndTime = Date.now() + (remainingSeconds * 1000);
            
            timerInterval = setInterval(timerTick, 50); 
            
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');
            
            btnStop.disabled = false;
            btnStop.classList.remove('opacity-50', 'cursor-not-allowed');
            btnEditInline.classList.add('hidden');
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            isRunning = false;
            clearInterval(timerInterval);
            
            iconPause.classList.add('hidden');
            iconPlay.classList.remove('hidden');
            btnEditInline.classList.remove('hidden');
        }

        function togglePlayPause() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function resetTimer() {
            pauseTimer();
            remainingSeconds = totalTimeSeconds;
            updateDisplay();
            
            btnStop.disabled = true;
            btnStop.classList.add('opacity-50', 'cursor-not-allowed');
            progressCircle.classList.remove('timer-done-pulse');
            timeDisplay.classList.remove('text-red-500');
        }

        function stopTimer() {
            pauseTimer();
            remainingSeconds = 0;
            updateDisplay();
            
            btnStop.disabled = true;
            btnStop.classList.add('opacity-50', 'cursor-not-allowed');
        }

        function openEditMode() {
            pauseTimer();
            
            inputHours.value = Math.floor(totalTimeSeconds / 3600).toString().padStart(2, '0');
            inputMinutes.value = Math.floor((totalTimeSeconds % 3600) / 60).toString().padStart(2, '0');
            inputSeconds.value = Math.floor(totalTimeSeconds % 60).toString().padStart(2, '0');

            displayView.classList.add('hidden');
            displayView.classList.remove('flex');
            editView.classList.remove('hidden');
            editView.classList.add('flex');
        }

        function closeEditMode() {
            editView.classList.add('hidden');
            editView.classList.remove('flex');
            displayView.classList.remove('hidden');
            displayView.classList.add('flex');
        }

        function saveDuration() {
            const h = parseInt(inputHours.value) || 0;
            const m = parseInt(inputMinutes.value) || 0;
            const s = parseInt(inputSeconds.value) || 0;
            
            const newTotal = (h * 3600) + (m * 60) + s;
            
            if (newTotal > 0) {
                totalTimeSeconds = newTotal;
                resetTimer(); 
            }
            closeEditMode();
        }

        function formatInput(e) {
            let val = parseInt(e.target.value);
            if (isNaN(val) || val < 0) val = 0;
            
            if ((e.target === inputMinutes || e.target === inputSeconds) && val > 59) {
                val = 59;
            }
            if (e.target === inputHours && val > 99) {
                val = 99;
            }
            
            e.target.value = val.toString().padStart(2, '0');
        }

        btnPlayPause.addEventListener('click', togglePlayPause);
        btnReset.addEventListener('click', resetTimer);
        btnStop.addEventListener('click', stopTimer);
        
        btnEditInline.addEventListener('click', openEditMode);
        btnCancelEdit.addEventListener('click', closeEditMode);
        btnSaveEdit.addEventListener('click', saveDuration);

        [inputHours, inputMinutes, inputSeconds].forEach(input => {
            input.addEventListener('blur', formatInput);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    formatInput({target: input}); 
                    saveDuration();
                }
            });
        });

        function switchView(view) {
            if (view === 'digital') {
                btnViewDigital.classList.replace('text-notion-light', 'text-notion-text');
                btnViewDigital.classList.replace('bg-transparent', 'bg-white');
                btnViewDigital.classList.add('shadow-sm');
                
                btnViewAnalog.classList.replace('text-notion-text', 'text-notion-light');
                btnViewAnalog.classList.replace('bg-white', 'bg-transparent');
                btnViewAnalog.classList.remove('shadow-sm');
                
                digitalContainer.classList.remove('hidden');
                analogContainer.classList.add('hidden');
            } else {
                btnViewAnalog.classList.replace('text-notion-light', 'text-notion-text');
                btnViewAnalog.classList.replace('bg-transparent', 'bg-white');
                btnViewAnalog.classList.add('shadow-sm');
                
                btnViewDigital.classList.replace('text-notion-text', 'text-notion-light');
                btnViewDigital.classList.replace('bg-white', 'bg-transparent');
                btnViewDigital.classList.remove('shadow-sm');
                
                analogContainer.classList.remove('hidden');
                digitalContainer.classList.add('hidden');
            }
        }
        
        btnViewDigital.addEventListener('click', () => switchView('digital'));
        btnViewAnalog.addEventListener('click', () => switchView('analog'));

        function generateAnalogTicks() {
            for (let i = 0; i < 60; i++) {
                const angle = (i / 60) * 2 * Math.PI;
                const isMajor = i % 5 === 0;
                const outerRadius = 45;
                const innerRadius = isMajor ? 39 : 42;
                const x1 = 50 + outerRadius * Math.sin(angle);
                const y1 = 50 - outerRadius * Math.cos(angle);
                const x2 = 50 + innerRadius * Math.sin(angle);
                const y2 = 50 - innerRadius * Math.cos(angle);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', isMajor ? '#a3a3a3' : '#e5e7eb');
                line.setAttribute('stroke-width', isMajor ? '1.5' : '1');
                analogTicks.appendChild(line);
            }
        }

        let isDraggingAnalog = false;
        let previousAngle = 0;
        let totalAnalogAngle = 0;

        function getMouseAngle(e) {
            const rect = analogSvg.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = clientX - centerX;
            const dy = clientY - centerY;
            
            let angle = Math.atan2(dy, dx) + Math.PI / 2;
            if (angle < 0) angle += 2 * Math.PI;
            
            return angle;
        }

        function startDrag(e) {
            if (isRunning) pauseTimer();
            isDraggingAnalog = true;
            analogKnob.classList.add('cursor-grabbing');
            
            const angle = getMouseAngle(e);
            
            const currentHours = Math.floor(totalTimeSeconds / 3600);
            let newFractionalSeconds = Math.round((angle / (2 * Math.PI)) * 3600);
            
            if (angle > 2 * Math.PI - 0.05) newFractionalSeconds = 0;
            
            totalTimeSeconds = currentHours * 3600 + newFractionalSeconds;
            remainingSeconds = totalTimeSeconds;
            totalAnalogAngle = (totalTimeSeconds / 3600) * 2 * Math.PI;
            previousAngle = angle;
            
            updateDisplay();
        }

        function updateFromDrag(e) {
            const currentAngle = getMouseAngle(e);
            let delta = currentAngle - previousAngle;
            
            if (delta < -Math.PI) {
                delta += 2 * Math.PI; 
            } else if (delta > Math.PI) {
                delta -= 2 * Math.PI; 
            }
            
            totalAnalogAngle += delta;
            if (totalAnalogAngle < 0) totalAnalogAngle = 0; 
            
            previousAngle = currentAngle;
            
            totalTimeSeconds = Math.round((totalAnalogAngle / (2 * Math.PI)) * 3600);
            remainingSeconds = totalTimeSeconds;
            updateDisplay();
        }

        function drag(e) {
            if (!isDraggingAnalog) return;
            e.preventDefault(); 
            updateFromDrag(e);
        }

        function endDrag() {
            isDraggingAnalog = false;
            analogKnob.classList.remove('cursor-grabbing');
        }

        analogSvg.addEventListener('mousedown', startDrag);
        analogSvg.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        generateAnalogTicks();

        // Initialize UI on load
        updateDisplay();
    </script>
</body>
</html>
